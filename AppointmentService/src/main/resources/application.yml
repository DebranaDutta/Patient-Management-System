spring:
  application:
    name: AppointmentService
  datasource:
    url: jdbc:mysql://localhost:3306/dcm
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8083	

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      DoctorService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      PatientService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

  retry:
    instances:
      DoctorService: 
        max-attempts: 3
        wait-duration: 500ms
      PatientService:
        max-attempts: 3
        wait-duration: 500ms

  bulkhead:
    instances:
      DoctorService:
        max-concurrent-calls: 10
        max-wait-duration: 500ms
      PatientService:
        max-concurrent-calls: 10
        max-wait-duration: 500ms
      